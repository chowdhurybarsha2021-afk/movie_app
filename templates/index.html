<!DOCTYPE html>
<html>
<head>
    <title>Movie Recommender</title>

    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            text-align: center;
            padding: 50px;
        }

        h1 {
            color: #00ffcc;
        }

        input {
            padding: 10px;
            width: 250px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 15px;
            background: #00ffcc;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .movie {
            background: #222;
            margin: 10px auto;
            padding: 10px;
            width: 300px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <h1>🎬 Movie Recommender</h1>

    <form method="POST">
        <input type="text" name="movie" placeholder="Enter movie name">
        <button type="submit">Search</button>
    </form>

    <h2>Results for: {{ movie_name }}</h2>

    {% if recommendations %}
        {% for movie in recommendations %}
            <div class="movie">🎥 {{ movie }}</div>
        {% endfor %}
    {% endif %}

</body>
</html>
