<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Movie App</title>

    <style>
        body {
            font-family: Arial;
            background: #0f0f0f;
            color: white;
            margin: 0;
            padding: 0;
        }

        .topbar {
            background: #111;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topbar h2 {
            color: #00ffcc;
            margin: 0;
        }

        .logout {
            color: white;
            text-decoration: none;
            background: #ff4444;
            padding: 8px 12px;
            border-radius: 6px;
        }

        .container {
            text-align: center;
            padding: 40px;
        }

        input {
            padding: 12px;
            width: 260px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            padding: 12px 18px;
            background: #00ffcc;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #00ddb3;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .card {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 12px;
        }

        img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            border-radius: 10px;
        }

        .title {
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <!-- TOP BAR -->
    <div class="topbar">
        <h2>🎬 Movie Dashboard</h2>
        <a class="logout" href="/logout">Logout</a>
    </div>

    <!-- SEARCH -->
    <div class="container">

        <h3>Welcome {{ user }}</h3>

        <form method="POST">
            <input type="text" name="movie" placeholder="Search movie">
            <button type="submit">Search</button>
        </form>

        <h3>Results for: {{ movie_name }}</h3>

        {% if recommendations %}
        <div class="grid">
            {% for movie in recommendations %}
            <div class="card">

                {% if movie.poster %}
                    <img src="{{ movie.poster }}">
                {% endif %}

                <div class="title">{{ movie.title }}</div>

            </div>
            {% endfor %}
        </div>
        {% endif %}

    </div>

</body>
</html>
