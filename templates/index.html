<!DOCTYPE html>
<html>
<head>
    <title>Movie App</title>

    <style>
        body{
            background:#0f0f0f;
            color:white;
            font-family:Arial;
            text-align:center;
            padding:30px;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
            gap:15px;
            margin-top:20px;
        }

        .card{
            background:#1e1e1e;
            padding:10px;
            border-radius:10px;
        }

        img{
            width:100%;
            height:260px;
            object-fit:cover;
            border-radius:10px;
        }

        input,button{
            padding:10px;
            margin:5px;
        }

        a{
            color:#00ffcc;
        }
    </style>
</head>

<body>

<h2>🎬 Welcome {{ user }}</h2>
<a href="/logout">Logout</a>

<form method="POST">
    <input type="text" name="movie" placeholder="Enter movie name">
    <button type="submit">Search</button>
</form>

<h3>Results for: {{ movie_name }}</h3>

<div class="grid">

{% for movie in recommendations %}
    <div class="card">

        {% if movie.poster %}
            <img src="{{ movie.poster }}">
        {% else %}
            <div>No Image</div>
        {% endif %}

        <p>{{ movie.title }}</p>
    </div>
{% endfor %}

</div>

</body>
</html>
