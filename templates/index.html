<!DOCTYPE html>
<html>
<head>
    <title>Movie Recommender</title>

    <style>
        body {
            font-family: Arial;
            background: #0f0f0f;
            color: white;
            text-align: center;
            padding: 40px;
        }

        h1 {
            color: #00ffcc;
            margin-bottom: 20px;
        }

        form {
            margin-bottom: 20px;
        }

        input {
            padding: 12px;
            width: 260px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            padding: 12px 18px;
            background: #00ffcc;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #00ddb3;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 30px;
            padding: 10px;
        }

        .card {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 12px;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .card:hover {
            transform: scale(1.05);
            background: #2a2a2a;
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        .title {
            margin-top: 10px;
            font-size: 14px;
        }

        .result-title {
            margin-top: 20px;
            color: #aaa;
        }
    </style>
</head>

<body>

    <h1>🎬 Movie Recommender</h1>

    <form method="POST">
        <input type="text" name="movie" placeholder="Enter movie name">
        <button type="submit">Search</button>
    </form>

    <h2 class="result-title">Results for: {{ movie_name }}</h2>

    {% if recommendations %}
    <div class="grid">
        {% for movie in recommendations %}
        <div class="card">

            {% if movie.poster %}
                <img src="{{ movie.poster }}">
            {% endif %}

            <div class="title">{{ movie.title }}</div>

        </div>
        {% endfor %}
    </div>
    {% endif %}

</body>
</html>
