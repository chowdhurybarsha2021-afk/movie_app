<!DOCTYPE html>
<html>
<head>
    <title>Movie Recommender</title>

    <style>
        body {
            font-family: Arial;
            background: #0f0f0f;
            color: white;
            text-align: center;
            padding: 30px;
        }

        h1 {
            color: #00ffcc;
        }

        input, button {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
        }

        button {
            background: #00ffcc;
            cursor: pointer;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .card {
            background: #1e1e1e;
            padding: 10px;
            border-radius: 10px;
        }

        img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            border-radius: 10px;
        }

        .title {
            margin-top: 8px;
        }
    </style>
</head>

<body>

    <h1>🎬 Movie Recommender</h1>

    <form method="POST">
        <input type="text" name="movie" placeholder="Enter movie name">
        <button type="submit">Search</button>
    </form>

    <h3>Results for: {{ movie_name }}</h3>

    <div class="grid">

        {% for movie in recommendations %}
        <div class="card">

            {% if movie.poster %}
                <img src="{{ movie.poster }}">
            {% else %}
                <div>No Image</div>
            {% endif %}

            <div class="title">{{ movie.title }}</div>

        </div>
        {% endfor %}

    </div>

</body>
</html>
